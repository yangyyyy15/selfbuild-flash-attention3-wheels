name: Build SageAttention for ComfyUI

on:
  workflow_dispatch: # 允许你在 GitHub 网页端手动点击运行

jobs:
  build-win-wheels:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Enable Windows long-path
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
                           -Name "LongPathsEnabled" `
                           -Value 1 -PropertyType DWORD -Force
          git config --global core.longpaths true

      - uses: actions/checkout@v6
      
      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install CUDA 12.8
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '12.8.0'

      - name: Build SageAttention Wheel
        shell: pwsh
        run: .\scripts\build_sage_wheel.ps1

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: sageattention-win-cu128-torch270-py310
          path: C:\tmp\wheels\*.whl
          retention-days: 7
